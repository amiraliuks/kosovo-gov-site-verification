<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kosovo Gov Checker</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="popup-root" role="dialog" aria-label="Kosovo Government Domain Checker">
    <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

    <header class="popup-header">
      <div class="flag-wrap">
        <img src="../../assets/kosovo-flag.png" class="flag" alt="Kosovo flag" />
      </div>
      <div class="title-wrap">
        <p class="eyebrow">Republic of Kosovo</p>
        <h1 id="title" class="title"></h1>
      </div>
    </header>

    <main class="popup-main">
      <div id="domainStatus" class="status-box" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="statusText"></span>
      </div>

      <button id="checkBtn" class="btn" type="button"></button>

      <a id="sourceLink" class="source-link" href="https://github.com/AmirAliuA/kosovo-gov-site-verification" target="_blank"
        rel="noopener">View Source Code</a>

      <p id="disclaimer" class="disclaimer"></p>
    </main>

    <footer class="popup-footer">
      <label class="auto-check">
        <input id="autocheckToggle" type="checkbox" checked />
        <span class="auto-check-track" aria-hidden="true"></span>
        <span class="auto-check-label">Auto-check on open</span>
      </label>
    </footer>
  </div>

  <script src="../shared/domain-match.js" defer></script>
  <script src="popup.js" defer></script>
</body>
</html>
